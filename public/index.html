<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>全球權證即時過濾系統</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; margin:0; padding:20px; text-align:center; }
    h1 { color:#0f0; }
    input, button { padding:12px; font-size:18px; margin:10px; }
    button { background:#0f0; border:none; color:black; cursor:pointer; }
    #result { margin-top:30px; white-space:pre-wrap; background:#222; padding:20px; border-radius:8px; min-height:200px; text-align:left; }
  </style>
</head>
<body>
  <h1>全球權證即時過濾系統</h1>

  <input type="text" id="stock" placeholder="輸入股票代號 如 2330" value="2330" />
  <button onclick="query('swing')">波段</button>
  <button onclick="query('short')">極短線</button>

  <div id="result">查詢結果將顯示在這裡...</div>

  <script>
    async function query(mode) {
      const stock = document.getElementById('stock').value.trim();
      if (!stock) return alert('請輸入股票代號');

      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '查詢中...';

      try {
        const res = await fetch(`/api/warrants?stock=${stock}&mode=${mode}`);
        const data = await res.json();

        if (data.error) {
          resultDiv.innerHTML = `<span style="color:red">錯誤：${data.error}</span>`;
          return;
        }

        if (data.count === 0) {
          resultDiv.innerHTML = '無符合條件的權證';
          return;
        }

        let html = `<h3>${data.target} (${data.mode}) - 找到 ${data.count} 檔</h3><table border="1" style="width:100%;border-collapse:collapse;">
          <tr style="background:#333"><th>代號</th><th>名稱</th><th>天數</th><th>價內外</th><th>買價</th><th>賣價</th><th>槓桿</th><th>DLR</th><th>分數</th></tr>`;

        data.data.forEach(w => {
          html += `<tr>
            <td>${w.symbol}</td>
            <td>${w.name}</td>
            <td>${w.days}</td>
            <td>${w.moneyness.toFixed(2)}</td>
            <td>${w.bid.toFixed(2)}</td>
            <td>${w.ask.toFixed(2)}</td>
            <td>${w.lev.toFixed(2)}</td>
            <td>${w.dlr_percent}</td>
            <td>${w.score}</td>
          </tr>`;
        });

        html += '</table>';
        resultDiv.innerHTML = html;
      } catch (err) {
        resultDiv.innerHTML = `<span style="color:red">請求失敗：${err.message}</span>`;
      }
    }
  </script>
</body>
</html>
